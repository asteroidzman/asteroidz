name: release-scenefx

# Keeps asteroidz-scenefx in lockstep with asteroidz: every published
# asteroidz release creates a matching release (same tag/version) in the
# asteroidz-scenefx repo, which in turn triggers that repo's own
# aur-publish workflow. This deliberately overrides scenefx's own prior
# independent versioning scheme (0.4.x/0.5.x) going forward -- from here
# on its version tracks asteroidz's, not its own history.
#
# Needs a fine-grained PAT scoped to asteroidzman/asteroidz-scenefx with
# Contents: write, stored as the SCENEFX_REPO_TOKEN secret in THIS repo
# (asteroidz) -- the default GITHUB_TOKEN can only ever write to the repo
# the workflow runs in, never a different one.

on:
  release:
    types: [published]
  # manual escape hatch (e.g. to retroactively align scenefx's version
  # after enabling this workflow, or to re-run if a release-triggered run
  # failed) -- takes the version to release as an input since there's no
  # github.event.release in a manual run.
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.17.1), no leading v'
        required: true

jobs:
  release-scenefx:
    name: Create a matching asteroidz-scenefx release
    runs-on: ubuntu-latest
    steps:
      - name: Check out asteroidz-scenefx
        uses: actions/checkout@v4
        with:
          repository: asteroidzman/asteroidz-scenefx
          token: ${{ secrets.SCENEFX_REPO_TOKEN }}

      - name: Bump meson.build to the release version
        run: |
          VERSION="${{ github.event.inputs.version || github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          # Restricted to the project() call (always within the first ~15
          # lines) AND anchored so it only matches a line starting with
          # "version:", not "meson_version:" -- an earlier unanchored,
          # unrestricted version of this sed matched EVERY "version: '...',"
          # line in the file, including meson_version and every
          # dependency()'s own version requirement (libdrm/xkbcommon/
          # pixman-1), corrupting the build entirely.
          sed -i "1,15{/^[[:space:]]*version:/s/version: '[^']*',/version: '${VERSION}',/}" meson.build
          git config user.name "asteroidzman"
          git config user.email "asteroidzman@users.noreply.github.com"
          git add meson.build
          git diff --cached --quiet || git commit -m "meson.build: bump version to ${VERSION}"
          git push origin HEAD:main

      - name: Create the asteroidz-scenefx release
        env:
          GH_TOKEN: ${{ secrets.SCENEFX_REPO_TOKEN }}
        run: |
          gh release create "$VERSION" \
            --repo asteroidzman/asteroidz-scenefx \
            --title "$VERSION" \
            --target main \
            --notes "Released alongside [asteroidz $VERSION](https://github.com/asteroidzman/asteroidz/releases/tag/$VERSION)."
