name: aur-publish

on:
  release:
    types: [published]

# pushing the version-bumped PKGBUILD back to this repo needs write access;
# the default GITHUB_TOKEN is read-only for that on some repo settings.
permissions:
  contents: write

jobs:
  aur-publish:
    name: Publish asteroidz to the AUR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bump PKGBUILD to the release version
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD

      - name: Commit bumped PKGBUILD back to the repo
        run: |
          git config user.name "asteroidzman"
          git config user.email "asteroidzman@users.noreply.github.com"
          git add PKGBUILD
          git diff --cached --quiet || git commit -m "PKGBUILD: bump to ${{ github.event.release.tag_name }}"
          git push origin HEAD:${{ github.event.repository.default_branch }}

      - name: Publish to the AUR
        uses: KSXGitHub/github-actions-deploy-aur@v4.2.0
        with:
          pkgname: asteroidz
          pkgbuild: ./PKGBUILD
          commit_username: asteroidzman
          commit_email: asteroidzman@users.noreply.github.com
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: Update to ${{ github.event.release.tag_name }}
          ssh_keyscan_types: rsa,ecdsa,ed25519
          # test: true can't actually validate this package: asteroidz depends
          # on asteroidz-scenefx, itself an AUR-only package, and this
          # container's plain pacman has no way to resolve/install an AUR
          # dependency (no yay/paru here) -- meson setup would fail to find
          # it regardless of test_flags (--nodeps vs --syncdeps), since it's
          # a hard dependency() in meson.build, not just a makepkg-level
          # check. Tried --syncdeps first (fixes a real, separate gap --
          # --nodeps, the action's own default, never installs the
          # PKGBUILD's makedepends like meson either, which broke the
          # 0.17.0 and first 0.17.1 publish attempts with "arch-meson:
          # command not found") but hit this next. Real verification
          # (build + full regression suite) already happens locally/in
          # ci-check.yml before a release is ever cut.
          test: false
