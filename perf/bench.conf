monitorrule=name:HEADLESS-1,width:3840,height:2160,refresh:144
# Minimal isolated benchmark config for asteroidz (headless). No DE autostart.
# Effects mirror the real desktop so GPU cost is representative.
enable_hotarea=0
enable_titlebar=1
titlebar_height=36

# effects (match ~/.config/asteroidz/scenefx.conf)
blur=1
blur_optimized=1
blur_params_num_passes=3
blur_params_radius=8
shadows=1
shadows_contact=1
border_gradient=1
animation_curve_type=spring
spring_damping=0.8
spring_frequency=22

# tag layouts
tagrule=id:1,layout_name:tile
tagrule=id:2,layout_name:scroller
